<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Mr. Cantu Board</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --surface: #111; --border: #2a2a2a;
    --text: #e8e8e8; --muted: #555; --accent: #4a9eff;
    --late: #c0392b; --late-bg: #180808; --danger: #c0392b;
    --success: #27ae60;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; min-height: 100vh; }

  #gate {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  #gate.hidden { display: none; }
  .gate-box { width: 320px; text-align: center; }
  .gate-box h2 { font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 28px; }
  .gate-box input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 11px 14px; font-size: 0.9rem; border-radius: 3px;
    outline: none; margin-bottom: 10px;
  }
  .gate-box input:focus { border-color: var(--accent); }
  .gate-box button {
    width: 100%; background: var(--accent); color: #000; border: none;
    padding: 11px; font-size: 0.82rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; border-radius: 3px; cursor: pointer;
  }
  .gate-box button:hover { opacity: 0.9; }
  #gateErr { font-size: 0.72rem; color: var(--danger); margin-top: 8px; min-height: 16px; }

  #app { display: none; }
  #app.visible { display: block; }

  header {
    border-bottom: 1px solid var(--border); padding: 22px 40px;
    display: flex; align-items: baseline; justify-content: space-between;
    position: sticky; top: 0; background: var(--bg); z-index: 10;
  }
  header h1 { font-size: 0.85rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; }
  .header-right { display: flex; align-items: center; gap: 14px; }
  #saveStatus { font-size: 0.68rem; letter-spacing: 0.06em; transition: color 0.2s; }
  .btn-logout {
    font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); background: none; border: 1px solid var(--border);
    padding: 5px 10px; border-radius: 2px; cursor: pointer;
  }
  .btn-logout:hover { color: var(--text); border-color: #444; }

  .layout { display: grid; grid-template-columns: 1fr 300px; min-height: calc(100vh - 63px); }
  .main { padding: 40px; border-right: 1px solid var(--border); }
  .sidebar { padding: 36px 28px; }

  .sec { margin-bottom: 44px; }
  .sec-label {
    font-size: 0.6rem; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 16px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  label { font-size: 0.68rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; display: block; margin-bottom: 5px; }
  input[type=text], input[type=date], textarea {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 9px 12px; font-size: 0.84rem; font-family: inherit;
    border-radius: 3px; outline: none; resize: vertical;
  }
  input[type=text]:focus, input[type=date]:focus, textarea:focus { border-color: var(--accent); }
  input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.5); }
  .field { margin-bottom: 12px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .btn {
    font-size: 0.72rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 8px 14px; border-radius: 3px; cursor: pointer; border: none;
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover:not(:disabled) { opacity: 0.88; }
  .btn-danger { background: transparent; border: 1px solid #3a1212; color: var(--danger); }
  .btn-danger:hover { background: var(--late-bg); }

  .asgn-item {
    border: 1px solid var(--border); border-radius: 3px; margin-bottom: 8px;
    padding: 11px 14px; display: flex; align-items: center; justify-content: space-between;
  }
  .asgn-item.late { border-color: #3a1212; background: var(--late-bg); }
  .asgn-left { flex: 1; min-width: 0; }
  .asgn-title { font-size: 0.84rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .asgn-due { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }
  .asgn-item.late .asgn-due { color: var(--late); }
  .asgn-actions { display: flex; gap: 6px; flex-shrink: 0; margin-left: 12px; }

  .date-item {
    border: 1px solid var(--border); border-radius: 3px; margin-bottom: 8px;
    padding: 10px 14px; display: flex; align-items: center; justify-content: space-between;
  }
  .date-item.past { border-color: #3a1212; background: var(--late-bg); }
  .date-left { flex: 1; }
  .date-title-txt { font-size: 0.82rem; font-weight: 500; }
  .date-meta { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }
  .date-item.past .date-meta { color: var(--late); }

  textarea#notesInput { min-height: 140px; }
  .empty { font-size: 0.78rem; color: var(--muted); font-style: italic; }

  /* Toast notification */
  #toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--success); color: #fff; font-size: 0.78rem; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase; padding: 10px 22px;
    border-radius: 3px; opacity: 0; transition: opacity 0.25s, transform 0.25s;
    pointer-events: none; z-index: 999;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.error { background: var(--danger); }

  @media (max-width: 720px) {
    .layout { grid-template-columns: 1fr; }
    .main { border-right: none; border-bottom: 1px solid var(--border); padding: 24px 16px; }
    .sidebar { padding: 24px 16px; }
    header { padding: 18px 16px; }
  }
</style>
</head>
<body>

<div id="gate">
  <div class="gate-box">
    <h2>Admin Access</h2>
    <input type="password" id="pwInput" placeholder="Password" onkeydown="if(event.key==='Enter')tryLogin()">
    <button onclick="tryLogin()">Enter</button>
    <div id="gateErr"></div>
  </div>
</div>

<div id="app">
<header>
  <h1>Mr. Cantu — Admin</h1>
  <div class="header-right">
    <span id="saveStatus"></span>
    <button class="btn-logout" onclick="logout()">Log out</button>
  </div>
</header>

<div class="layout">
  <div class="main">
    <div class="sec">
      <div class="sec-label">Add Assignment</div>
      <div class="field"><label>Title</label><input type="text" id="aTitle" placeholder="e.g. Chapter 4 Review"></div>
      <div class="field"><label>Due Date</label><input type="date" id="aDue"></div>
      <div class="field"><label>Description (optional)</label><textarea id="aDesc" rows="3" placeholder="Details, instructions, links..."></textarea></div>
      <button class="btn btn-primary" id="addAsgnBtn" onclick="addAssignment()">Add Assignment</button>
    </div>

    <div class="sec">
      <div class="sec-label">All Assignments</div>
      <div id="asgnList"></div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sec">
      <div class="sec-label">Important Dates</div>
      <div class="field"><label>Title</label><input type="text" id="dTitle" placeholder="e.g. Final Exam"></div>
      <div class="field"><label>Date</label><input type="date" id="dDate"></div>
      <div class="field"><label>Note (optional)</label><input type="text" id="dNote" placeholder="e.g. Bring #2 pencils"></div>
      <button class="btn btn-primary" id="addDateBtn" onclick="addDate()" style="margin-bottom:18px">Add Date</button>
      <div id="datesList"></div>
    </div>

    <div class="sec">
      <div class="sec-label">Board Notes</div>
      <div class="field"><textarea id="notesInput" placeholder="Announcements, reminders, etc."></textarea></div>
      <button class="btn btn-primary" id="saveNotesBtn" onclick="saveNotes()">Save Notes</button>
    </div>
  </div>
</div>
</div>

<div id="toast"></div>

<script>
  // ── CONFIGURATION ─────────────────────────────────────────────
  const PASSWORD   = 'pass';
  const BIN_ID     = '69fdf713adc21f119a705aed';
  const MASTER_KEY = '$2a$10$Pp5qkQoFzSUlM3kiEOu8Ze4CwMOBZREWzZKn1YMntYK8xmZiDM7Re';
  // NOTE: Go to jsonbin.io → API Keys and grab your MASTER KEY
  // (it starts with $2a$10$ — different from the Access Key)
  // ─────────────────────────────────────────────────────────────

  // ── AUTH ──
  function tryLogin() {
    const val = document.getElementById('pwInput').value;
    if (val === PASSWORD) {
      sessionStorage.setItem('cantyadmin', '1');
      document.getElementById('gate').classList.add('hidden');
      document.getElementById('app').classList.add('visible');
      loadData();
    } else {
      document.getElementById('gateErr').textContent = 'Incorrect password.';
      document.getElementById('pwInput').value = '';
    }
  }

  function logout() {
    sessionStorage.removeItem('cantyadmin');
    location.reload();
  }

  if (sessionStorage.getItem('cantyadmin') === '1') {
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
  }

  // ── TOAST ──
  let toastTimer;
  function toast(msg, isErr) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show' + (isErr ? ' error' : '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 2800);
  }

  // ── DATA ──
  let DATA = { assignments: [], dates: [], notes: {} };

  async function loadData() {
    try {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
        headers: { 'X-Master-Key': MASTER_KEY }
      });
      if (!res.ok) throw new Error(res.status);
      const json = await res.json();
      DATA = json.record;
      renderAll();
    } catch (e) {
      toast('Failed to load data — check your keys', true);
      console.error('Load error:', e);
    }
  }

  // Returns true on success, false on failure
  async function save() {
    document.getElementById('saveStatus').textContent = 'Saving…';
    try {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'X-Master-Key': MASTER_KEY   // ← must be Master Key for writes
        },
        body: JSON.stringify(DATA)
      });
      if (!res.ok) {
        const errBody = await res.json().catch(() => ({}));
        console.error('Save failed:', res.status, errBody);
        document.getElementById('saveStatus').textContent = '';
        toast('Save failed (' + res.status + ') — check Master Key', true);
        return false;
      }
      document.getElementById('saveStatus').textContent = '';
      return true;
    } catch (e) {
      console.error('Save error:', e);
      document.getElementById('saveStatus').textContent = '';
      toast('Save failed — network error', true);
      return false;
    }
  }

  // ── HELPERS ──
  function isLate(d) { return new Date() > new Date(d + 'T23:59:59'); }
  function fmt(s) {
    if (!s) return '';
    return new Date(s + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }
  function esc(s) {
    if (!s) return '';
    const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
  }
  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.textContent = loading ? 'Saving…' : btn.dataset.label;
  }

  // ── ASSIGNMENTS ──
  async function addAssignment() {
    const title = document.getElementById('aTitle').value.trim();
    const due   = document.getElementById('aDue').value;
    const desc  = document.getElementById('aDesc').value.trim();
    if (!title || !due) { toast('Title and due date are required', true); return; }

    const btn = document.getElementById('addAsgnBtn');
    btn.dataset.label = btn.textContent;
    btn.disabled = true; btn.textContent = 'Saving…';

    DATA.assignments.push({ id: Date.now(), title, dueDate: due, description: desc });
    DATA.assignments.sort((a, b) => a.dueDate.localeCompare(b.dueDate));

    const ok = await save();
    btn.disabled = false; btn.textContent = btn.dataset.label;

    if (ok) {
      // Only clear the form if the save actually worked
      document.getElementById('aTitle').value = '';
      document.getElementById('aDue').value = '';
      document.getElementById('aDesc').value = '';
      toast('Assignment added ✓');
      renderAll();
    } else {
      // Roll back so we don't have a phantom entry
      DATA.assignments = DATA.assignments.filter(a => a.title !== title || a.dueDate !== due);
    }
  }

  async function deleteAssignment(id) {
    if (!confirm('Delete this assignment?')) return;
    const prev = [...DATA.assignments];
    DATA.assignments = DATA.assignments.filter(a => a.id !== id);
    const ok = await save();
    if (ok) { toast('Assignment removed'); renderAll(); }
    else { DATA.assignments = prev; toast('Delete failed', true); }
  }

  function renderAssignments() {
    const el = document.getElementById('asgnList');
    if (!DATA.assignments.length) { el.innerHTML = '<div class="empty">No assignments yet.</div>'; return; }
    el.innerHTML = DATA.assignments.map(a => `
      <div class="asgn-item${isLate(a.dueDate) ? ' late' : ''}">
        <div class="asgn-left">
          <div class="asgn-title">${esc(a.title)}</div>
          <div class="asgn-due">Due ${fmt(a.dueDate)}${isLate(a.dueDate) ? ' — PAST DUE' : ''}</div>
        </div>
        <div class="asgn-actions">
          <button class="btn btn-danger" onclick="deleteAssignment(${a.id})">Delete</button>
        </div>
      </div>`).join('');
  }

  // ── DATES ──
  async function addDate() {
    const title = document.getElementById('dTitle').value.trim();
    const date  = document.getElementById('dDate').value;
    const note  = document.getElementById('dNote').value.trim();
    if (!title || !date) { toast('Title and date are required', true); return; }

    const btn = document.getElementById('addDateBtn');
    btn.dataset.label = btn.textContent;
    btn.disabled = true; btn.textContent = 'Saving…';

    DATA.dates.push({ id: Date.now(), title, date, note });
    DATA.dates.sort((a, b) => a.date.localeCompare(b.date));

    const ok = await save();
    btn.disabled = false; btn.textContent = btn.dataset.label;

    if (ok) {
      document.getElementById('dTitle').value = '';
      document.getElementById('dDate').value = '';
      document.getElementById('dNote').value = '';
      toast('Date added ✓');
      renderAll();
    } else {
      DATA.dates = DATA.dates.filter(d => d.title !== title || d.date !== date);
    }
  }

  async function deleteDate(id) {
    if (!confirm('Delete this date?')) return;
    const prev = [...DATA.dates];
    DATA.dates = DATA.dates.filter(d => d.id !== id);
    const ok = await save();
    if (ok) { toast('Date removed'); renderAll(); }
    else { DATA.dates = prev; toast('Delete failed', true); }
  }

  function renderDates() {
    const el = document.getElementById('datesList');
    if (!DATA.dates.length) { el.innerHTML = '<div class="empty">No dates yet.</div>'; return; }
    el.innerHTML = DATA.dates.map(d => `
      <div class="date-item${isLate(d.date) ? ' past' : ''}">
        <div class="date-left">
          <div class="date-title-txt">${esc(d.title)}</div>
          <div class="date-meta">${fmt(d.date)}${d.note ? ' · ' + esc(d.note) : ''}</div>
        </div>
        <div><button class="btn btn-danger" onclick="deleteDate(${d.id})">✕</button></div>
      </div>`).join('');
  }

  // ── NOTES ──
  async function saveNotes() {
    const content = document.getElementById('notesInput').value.trim();
    const prev = DATA.notes;
    DATA.notes = {
      content,
      ts: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' })
    };

    const btn = document.getElementById('saveNotesBtn');
    btn.dataset.label = btn.textContent;
    btn.disabled = true; btn.textContent = 'Saving…';

    const ok = await save();
    btn.disabled = false; btn.textContent = btn.dataset.label;

    if (ok) toast('Notes saved ✓');
    else { DATA.notes = prev; toast('Save failed', true); }
  }

  function renderNotes() {
    document.getElementById('notesInput').value = (DATA.notes && DATA.notes.content) || '';
  }

  function renderAll() { renderAssignments(); renderDates(); renderNotes(); }

  if (sessionStorage.getItem('cantyadmin') === '1') loadData();
</script>
</body>
</html>
